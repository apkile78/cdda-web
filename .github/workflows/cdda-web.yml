name: CDDA WebAssembly Build  
  
on:  
  push:  
    tags:  
      - '0.*'  
      - '0.*-build*'  
  workflow_dispatch:  
    inputs:  
      release_tag:  
        description: 'CDDA release tag to build (e.g., 0.I for stable Ito)'  
        required: true  
        default: 'latest'  
  
# Lets the deploy job push the finished site to the gh-pages branch.  
permissions:  
  contents: write  
  
env:  
  EMSCRIPTEN_VERSION: '3.1.51'  
  CDDA_REPO: 'CleverRaven/cataclysm-dda'  
  BUILD_TYPE: 'Release'  
  BUILD_TILES: 'true'  
  BUILD_SOUND: 'true'  
  BUILD_LOCALIZATION: 'false'  
  
jobs:  
  # ===================================================================  
  # JOB 1: BUILD  (the long ~3h compile). Ends by uploading the finished  
  # web-output/ folder as an artifact the deploy job can pick up.  
  # ===================================================================  
  build:  
    name: Build CDDA WebAssembly  
    runs-on: ubuntu-latest  
    outputs:  
      tag: ${{ steps.get_tag.outputs.tag }}  
  
    steps:  
      - name: Checkout repository  
        uses: actions/checkout@v4  
        with:  
          fetch-depth: 0  
  
      - name: Get release tag  
        id: get_tag  
        run: |  
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then  
            if [ "${{ github.event.inputs.release_tag }}" = "latest" ]; then  
              echo "Fetching latest stable Ito release tag..."  
              TAG=$(git ls-remote --tags https://github.com/${{ env.CDDA_REPO }}.git | grep -E 'refs/tags/0\.[A-Z]$' | sed 's#.*/##' | sort -V | tail -n1)  
              echo "tag=$TAG" >> $GITHUB_OUTPUT  
            else  
              echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT  
            fi  
          else  
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT  
          fi  
          echo "Building CDDA release: ${{ steps.get_tag.outputs.tag }}"  
  
      - name: Install ccache  
        run: |  
          sudo apt-get update  
          sudo apt-get install -y ccache  
          ccache --version  
  
      - name: Install Emscripten (clean)  
        run: |  
          cd ~  
          # Always start from a completely fresh emsdk. A half-restored or  
          # partially-installed toolchain is what caused the recurring  
          # "emcc ... os.execv FileNotFoundError" on the freetype/imgui ports.  
          rm -rf emsdk  
          git clone https://github.com/emscripten-core/emsdk.git  
          cd emsdk  
          ./emsdk install ${{ env.EMSCRIPTEN_VERSION }}  
          ./emsdk activate ${{ env.EMSCRIPTEN_VERSION }}  
          source ./emsdk_env.sh  
          # Fail early (before the long compile) if the toolchain is broken.  
          emcc --version  
  
      - name: Cache ccache (compiler output cache)  
        uses: actions/cache@v4  
        with:  
          path: ~/.ccache  
          key: ccache-${{ steps.get_tag.outputs.tag }}-${{ github.sha }}  
          restore-keys: |  
            ccache-${{ steps.get_tag.outputs.tag }}-  
            ccache-  
  
      - name: Cache build artifacts  
        uses: actions/cache@v4  
        with:  
          path: |  
            build-cache  
            cdda-source  
          key: cdda-build-${{ steps.get_tag.outputs.tag }}-${{ env.BUILD_TYPE }}-${{ env.BUILD_TILES }}-${{ env.BUILD_SOUND }}  
          restore-keys: |  
            cdda-build-${{ steps.get_tag.outputs.tag }}-  
  
      - name: Fetch CDDA release  
        run: |  
          chmod +x scripts/fetch_release.sh  
          ./scripts/fetch_release.sh "${{ steps.get_tag.outputs.tag }}"  
  
      - name: Build CDDA WebAssembly  
        run: |  
          source ~/emsdk/emsdk_env.sh  
          # Turn ON CDDA's built-in ccache (your log showed CCACHE=0).  
          export CCACHE=1  
          export PATH="/usr/lib/ccache:$PATH"  
          export CCACHE_DIR="$HOME/.ccache"  
          export CCACHE_MAXSIZE=5G  
          chmod +x scripts/build_web.sh  
          ./scripts/build_web.sh  
          echo "----- ccache stats after build -----"  
          ccache --show-stats  
  
      - name: Package web build  
        run: |  
          export BUILD_VERSION="${{ steps.get_tag.outputs.tag }}"  
          export BUILD_TYPE="${{ env.BUILD_TYPE }}"  
          export BUILD_TILES="${{ env.BUILD_TILES }}"  
          export BUILD_SOUND="${{ env.BUILD_SOUND }}"  
          export BUILD_LOCALIZATION="${{ env.BUILD_LOCALIZATION }}"  
          export EMSCRIPTEN_VERSION="${{ env.EMSCRIPTEN_VERSION }}"  
          chmod +x scripts/package_web.sh  
          ./scripts/package_web.sh  
  
      - name: Upload site artifact (hand-off to deploy job)  
        uses: actions/upload-artifact@v4  
        with:  
          name: cdda-web-site  
          path: web-output/  
          retention-days: 30  
  
  # ===================================================================  
  # JOB 2: DEPLOY  (seconds). Downloads the finished site and publishes  
  # it to gh-pages. Re-runnable on its own without recompiling.  
  # ===================================================================  
  deploy:  
    name: Deploy to GitHub Pages  
    needs: build  
    runs-on: ubuntu-latest  
  
    steps:  
      - name: Download site artifact  
        uses: actions/download-artifact@v4  
        with:  
          name: cdda-web-site  
          path: web-output  
  
      - name: Deploy to GitHub Pages  
        uses: peaceiris/actions-gh-pages@v3  
        with:  
          github_token: ${{ secrets.GITHUB_TOKEN }}  
          publish_dir: ./web-output  
          publish_branch: gh-pages  
          force_orphan: true  
          user_name: 'github-actions[bot]'  
          user_email: 'github-actions[bot]@users.noreply.github.com'  
          commit_message: 'Deploy CDDA Web ${{ needs.build.outputs.tag }}'  
  
      - name: Create deployment summary  
        run: |  
          echo "## CDDA WebAssembly Deploy Complete" >> $GITHUB_STEP_SUMMARY  
          echo "**Release Tag:** \`${{ needs.build.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY  
          echo "Deployed to \`gh-pages\` branch - available at GitHub Pages" >> $GITHUB_STEP_SUMMARY
