<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cataclysm: Dark Days Ahead - WebAssembly</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #e0e0e0;
        }
        
        #game-container {
            position: relative;
            width: 100%;
            max-width: 1280px;
            height: 720px;
            background-color: #000;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }
        
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
        
        #info {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #888;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">
            <div class="spinner"></div>
            <p>Loading Cataclysm: Dark Days Ahead...</p>
            <p id="progress">Initializing...</p>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>
    
    <div id="controls">
        <button id="fullscreen" onclick="toggleFullscreen()">Fullscreen</button>
        <button id="restart" onclick="restartGame()">Restart Game</button>
        <button id="help" onclick="showHelp()">Controls Help</button>
    </div>
    
    <div id="info">
        <p>Cataclysm: Dark Days Ahead - WebAssembly Build</p>
        <p>Build version: <span id="build-version">Loading...</span></p>
    </div>

    <script>
        const loadingElement = document.getElementById('loading');
        const progressElement = document.getElementById('progress');
        const buildVersionElement = document.getElementById('build-version');
        const gameCanvas = document.getElementById('game-canvas');
        
        let gameInstance = null;
        
        // Load build version
        fetch('BUILD_VERSION')
            .then(response => response.text())
            .then(version => {
                buildVersionElement.textContent = version.trim();
            })
            .catch(() => {
                buildVersionElement.textContent = 'Unknown';
            });
        
        // Module configuration for modularized Emscripten output
        const moduleConfig = {
            canvas: gameCanvas,
            onRuntimeInitialized: function() {
                loadingElement.classList.add('hidden');
                console.log('CDDA WebAssembly initialized');
            },
            print: function(text) {
                console.log(text);
            },
            printErr: function(text) {
                console.error(text);
            },
            setStatus: function(text) {
                if (text) {
                    progressElement.textContent = text;
                }
            }
        };
        
        // Initialize game with modularized factory pattern
        function initGame() {
            progressElement.textContent = 'Loading game modules...';
            
            // Load the game script
            const script = document.createElement('script');
            script.src = 'cataclysm-tiles.js';
            script.onload = function() {
                console.log('Game script loaded, initializing factory...');
                // Call the exported factory
                Cataclysm(moduleConfig).then(instance => {
                    gameInstance = instance;
                    console.log('Game initialized successfully');
                    progressElement.textContent = 'Ready!';
                }).catch(error => {
                    console.error('Failed to initialize game:', error);
                    progressElement.textContent = 'Error: ' + error.message;
                });
            };
            script.onerror = function() {
                progressElement.textContent = 'Error loading game script';
                console.error('Failed to load cataclysm-tiles.js');
            };
            document.body.appendChild(script);
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.getElementById('game-container').requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        function restartGame() {
            if (gameInstance && gameInstance.callMain) {
                gameInstance.callMain([]);
            }
        }
        
        function showHelp() {
            alert(`
CDDA WebAssembly Controls:

Movement: Arrow keys or Numpad
Interact: Enter
Inventory: i
Actions: a
Crafting: c
Look around: l
Wait: .
Quit: ESC

For full controls, see the in-game help system.
            `);
        }
        
        // Start initialization
        window.addEventListener('load', initGame);
        
        // Handle keyboard input
        window.addEventListener('keydown', function(e) {
            // Prevent default behavior for game keys
            const gameKeys = [
                'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight',
                'Space', 'Enter', 'Escape', 'Tab',
                'a', 'c', 'i', 'l', '.', 'e', 'q', 'r'
            ];
            
            if (gameKeys.includes(e.key) || e.key.startsWith('F')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
